spring.application.name=digital-wallet

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wallet_db}
spring.datasource.username=${DB_USERNAME:wallet_user}
spring.datasource.password=${DB_PASSWORD:wallet_pass}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHNhbXBsZSBzZWNyZXQga2V5IGZvciBkZXZlbG9wbWVudA==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Wallet Limits
wallet.daily-deposit-limit=${DAILY_DEPOSIT_LIMIT:10000.00}
wallet.daily-withdrawal-limit=${DAILY_WITHDRAWAL_LIMIT:5000.00}
wallet.weekly-deposit-limit=${WEEKLY_DEPOSIT_LIMIT:50000.00}
wallet.weekly-withdrawal-limit=${WEEKLY_WITHDRAWAL_LIMIT:25000.00}
wallet.max-balance=${MAX_BALANCE:100000.00}

# Transaction archival
wallet.archive-after-days=${ARCHIVE_AFTER_DAYS:90}

# OTP
otp.expiry-seconds=${OTP_EXPIRY_SECONDS:300}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# Logging
logging.level.com.wallet=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Server
server.port=${SERVER_PORT:8080}
server.address=0.0.0.0
